name: NexusAI Prototype Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-prototype:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run NexusAI PoPW prototype
        run: python src/main.py
      - name: Verify demo output
        run: |
          test -f src/demo_output.json
          cat src/demo_output.json
     - name: Validate PoPW receipt
       run: python src/verify_receipt.py
      - name: Upload PoPW verification receipt
        uses: actions/upload-artifact@v4
        with:
          name: popw-verification-receipt
          path: src/demo_output.json
          if-no-files-found: error
